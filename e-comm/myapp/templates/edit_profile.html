<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-5">

<div class="row justify-content-center">

    <div class="col-md-8">

        <div class="card shadow">

            <div class="card-header bg-success text-white">
                <h3>Edit Profile</h3>
            </div>

            <div class="card-body">

                <form method="POST" action="{%url 'edit_profile'%}" enctype="multipart/form-data">

                    {% csrf_token %}

                    

                    <div class="text-center mb-4">

                        {% if profile.profile_image %}

                            <img src="{{ profile.profile_image.url }}"
                                 width="150"
                                 height="150"
                                 style="border-radius:50%; object-fit:cover;">

                        {% endif %}

                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">
                            Profile Image
                        </label>

                        <input type="file"
                               class="form-control"
                               name="profile_image">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            First Name
                        </label>

                        <input type="text"
                               class="form-control"
                               name="first_name"
                               value="{{ profile.user.first_name }}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Last Name
                        </label>

                        <input type="text"
                               class="form-control"
                               name="last_name"
                               value="{{ profile.user.last_name }}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Email
                        </label>

                        <input type="email"
                               class="form-control"
                               name="email"
                               value="{{ profile.user.email }}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Phone
                        </label>

                        <input type="text"
                               class="form-control"
                               name="phone"
                               value="{{ profile.phone }}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            City
                        </label>

                        <input type="text"
                               class="form-control"
                               name="city"
                               value="{{ profile.city }}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Bio
                        </label>

                        <textarea class="form-control"
                                  rows="4"
                                  name="bio">{{ profile.bio }}</textarea>
                    </div>

                    <button type="submit"
                            class="btn btn-success w-100">
                        Update Profile
                    </button>
                    <a href="{% url 'profile_create' %}"
                           class="btn btn-success px-4">
                            Back
                        </a>
                    
                </form>

            </div>

        </div>

    </div>

</div>
</div>

</body>
</html>
